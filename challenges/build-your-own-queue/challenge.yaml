slug: build-your-own-queue
name: Build your own message queue
short_description: >
  Build the broker every distributed system leans on: a durable message queue
  with at-least-once delivery, visibility timeouts, receipt fencing, and
  dead-letter queues — graded entirely over the wire, crashes included.
difficulty: hard
language_agnostic: true
protocol: PROTOCOL.md
entry_point: your_program.sh --port <port> --data-dir <path>
tester:
  challenge_flag: build-your-own-queue
