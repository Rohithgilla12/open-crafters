slug: build-your-own-lsm
name: Build your own LSM-tree
short_description: >
  Build a log-structured merge-tree key-value store: in-memory memtable,
  on-disk SSTables in a byte-exact format, range scans, compaction, and
  tombstones — graded over TCP and by parsing your SST files.
difficulty: hard
language_agnostic: true
protocol: PROTOCOL.md
entry_point: your_program.sh --port <port> --data-dir <path>
tester:
  challenge_flag: build-your-own-lsm
