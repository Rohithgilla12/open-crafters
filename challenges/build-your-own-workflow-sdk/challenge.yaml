slug: build-your-own-workflow-sdk
name: Build your own workflow SDK
short_description: >
  Build the deterministic replay engine behind Temporal workers: given an event
  history, emit the commands workflow code would produce — pure, repeatable,
  and correct after activities, timers, and signals.
difficulty: hard
language_agnostic: true
protocol: PROTOCOL.md
entry_point: your_program.sh --port <port> --data-dir <path>
