slug: build-your-own-distributed-lock
name: Build your own distributed lock
short_description: >
  Build a distributed lock service: exclusive acquire with leases, try-acquire
  without blocking, token-gated release and renew, crash-durable state, and
  concurrent multi-lock churn — graded over the wire.
difficulty: medium
language_agnostic: true
protocol: PROTOCOL.md
entry_point: your_program.sh --port <port> --data-dir <path>
tester:
