# VPS deployment when cloudflared routes use host IP:port (e.g. gilla.fun).
#
#   export RUNNER_TOKEN=$(openssl rand -hex 32)
#   docker compose -f deploy/vps-compose.yml up -d
#
# Cloudflare Tunnel public hostnames:
#   runner.gilla.fun → http://150.230.131.66:18080
#   learn.gilla.fun  → http://150.230.131.66:18081
#
# Port 18080 avoids conflict with qBittorrent on :8080.

services:
  learn:
    image: open-crafters-learn:latest
    container_name: open-crafters-learn
    restart: unless-stopped
    environment:
      LEARN_LISTEN: ":8081"
    ports:
      - "18081:8081"
    networks:
      - cloudflare-tunnel_default

  runner:
    image: open-crafters-runner:latest
    container_name: open-crafters-runner
    restart: unless-stopped
    environment:
      RUNNER_TOKEN: ${RUNNER_TOKEN:?set a long random secret}
      RUNNER_LISTEN: ":8080"
      RUNNER_GRADE_IMAGE: open-crafters-grade:latest
      RUNNER_MAX_CONCURRENT: "2"
      RUNNER_JOB_TIMEOUT: "15m"
      RUNNER_WORK_DIR: /var/lib/open-crafters/jobs
      # Optional: GitHub push → auto-grade (see docs/github-webhook.md)
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      RUNNER_GITHUB_BRANCHES: ${RUNNER_GITHUB_BRANCHES:-default}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/open-crafters/jobs:/var/lib/open-crafters/jobs
    ports:
      - "18080:8080"
    networks:
      - cloudflare-tunnel_default

networks:
  cloudflare-tunnel_default:
    external: true
