name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tester:
    name: Build crafters & verify challenges
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Vet, test, and build
        run: |
          go vet ./...
          go test ./...
          go build -o crafters ./cmd/crafters
          go build -o runner ./cmd/runner
          go build -o learn ./cmd/learn

      - name: "Reference: Build your own Temporal — Python"
        run: ./crafters grade --challenge build-your-own-temporal --all
          --program examples/solutions/build-your-own-temporal/python/your_program.sh
      - name: "Reference: Build your own Temporal — Go"
        run: ./crafters grade --challenge build-your-own-temporal --all
          --program examples/solutions/build-your-own-temporal/go/your_program.sh
      - name: "Reference: Build your own Temporal — TypeScript/Bun"
        run: ./crafters grade --challenge build-your-own-temporal --all
          --program examples/solutions/build-your-own-temporal/typescript/your_program.sh

      - name: "Reference: Build your own WAL — Python"
        run: ./crafters grade --challenge build-your-own-wal --all
          --program examples/solutions/build-your-own-wal/python/your_program.sh

      - name: "Reference: Build your own WAL — Go"
        run: ./crafters grade --challenge build-your-own-wal --all
          --program examples/solutions/build-your-own-wal/go/your_program.sh

      - name: "Reference: Build your own WAL — TypeScript/Bun"
        run: ./crafters grade --challenge build-your-own-wal --all
          --program examples/solutions/build-your-own-wal/typescript/your_program.sh

      - name: "Reference: Build your own message queue — Python"
        run: ./crafters grade --challenge build-your-own-queue --all
          --program examples/solutions/build-your-own-queue/python/your_program.sh
      - name: "Reference: Build your own message queue — Go"
        run: ./crafters grade --challenge build-your-own-queue --all
          --program examples/solutions/build-your-own-queue/go/your_program.sh
      - name: "Reference: Build your own message queue — TypeScript/Bun"
        run: ./crafters grade --challenge build-your-own-queue --all
          --program examples/solutions/build-your-own-queue/typescript/your_program.sh

      - name: "Reference: Build your own MVCC — Python"
        run: ./crafters grade --challenge build-your-own-mvcc --all
          --program examples/solutions/build-your-own-mvcc/python/your_program.sh
      - name: "Reference: Build your own MVCC — Go"
        run: ./crafters grade --challenge build-your-own-mvcc --all
          --program examples/solutions/build-your-own-mvcc/go/your_program.sh
      - name: "Reference: Build your own MVCC — TypeScript/Bun"
        run: ./crafters grade --challenge build-your-own-mvcc --all
          --program examples/solutions/build-your-own-mvcc/typescript/your_program.sh

      - name: "Reference: Build your own log — Python"
        run: ./crafters grade --challenge build-your-own-log --all
          --program examples/solutions/build-your-own-log/python/your_program.sh
      - name: "Reference: Build your own log — Go"
        run: ./crafters grade --challenge build-your-own-log --all
          --program examples/solutions/build-your-own-log/go/your_program.sh
      - name: "Reference: Build your own log — TypeScript/Bun"
        run: ./crafters grade --challenge build-your-own-log --all
          --program examples/solutions/build-your-own-log/typescript/your_program.sh

      - name: "Reference: Build your own LSM-tree — Python"
        run: ./crafters grade --challenge build-your-own-lsm --all
          --program examples/solutions/build-your-own-lsm/python/your_program.sh
      - name: "Reference: Build your own LSM-tree — Go"
        run: ./crafters grade --challenge build-your-own-lsm --all
          --program examples/solutions/build-your-own-lsm/go/your_program.sh
      - name: "Reference: Build your own LSM-tree — TypeScript/Bun"
        run: ./crafters grade --challenge build-your-own-lsm --all
          --program examples/solutions/build-your-own-lsm/typescript/your_program.sh

      - name: "Reference: Build your own workflow SDK — Python"
        run: ./crafters grade --challenge build-your-own-workflow-sdk --all
          --program examples/solutions/build-your-own-workflow-sdk/python/your_program.sh
      - name: "Reference: Build your own workflow SDK — Go"
        run: ./crafters grade --challenge build-your-own-workflow-sdk --all
          --program examples/solutions/build-your-own-workflow-sdk/go/your_program.sh
      - name: "Reference: Build your own workflow SDK — TypeScript/Bun"
        run: ./crafters grade --challenge build-your-own-workflow-sdk --all
          --program examples/solutions/build-your-own-workflow-sdk/typescript/your_program.sh

      - name: "Reference: Build your own Raft — Python"
        run: ./crafters grade --challenge build-your-own-raft --all
          --program examples/solutions/build-your-own-raft/python/your_program.sh
      - name: "Reference: Build your own Raft — Go"
        run: ./crafters grade --challenge build-your-own-raft --all
          --program examples/solutions/build-your-own-raft/go/your_program.sh
      - name: "Reference: Build your own Raft — TypeScript/Bun"
        run: ./crafters grade --challenge build-your-own-raft --all
          --program examples/solutions/build-your-own-raft/typescript/your_program.sh

      - name: "Reference: Build your own scheduler — Python"
        run: ./crafters grade --challenge build-your-own-scheduler --all
          --program examples/solutions/build-your-own-scheduler/python/your_program.sh
      - name: "Reference: Build your own scheduler — Go"
        run: ./crafters grade --challenge build-your-own-scheduler --all
          --program examples/solutions/build-your-own-scheduler/go/your_program.sh
      - name: "Reference: Build your own scheduler — TypeScript/Bun"
        run: ./crafters grade --challenge build-your-own-scheduler --all
          --program examples/solutions/build-your-own-scheduler/typescript/your_program.sh

      - name: "Reference: Build your own rate limiter — Python"
        run: ./crafters grade --challenge build-your-own-rate-limiter --all
          --program examples/solutions/build-your-own-rate-limiter/python/your_program.sh
      - name: "Reference: Build your own rate limiter — Go"
        run: ./crafters grade --challenge build-your-own-rate-limiter --all
          --program examples/solutions/build-your-own-rate-limiter/go/your_program.sh
      - name: "Reference: Build your own rate limiter — TypeScript/Bun"
        run: ./crafters grade --challenge build-your-own-rate-limiter --all
          --program examples/solutions/build-your-own-rate-limiter/typescript/your_program.sh

      - name: "Reference: Build your own object store — Python"
        run: ./crafters grade --challenge build-your-own-object-store --all
          --program examples/solutions/build-your-own-object-store/python/your_program.sh
      - name: "Reference: Build your own object store — Go"
        run: ./crafters grade --challenge build-your-own-object-store --all
          --program examples/solutions/build-your-own-object-store/go/your_program.sh
      - name: "Reference: Build your own object store — TypeScript/Bun"
        run: ./crafters grade --challenge build-your-own-object-store --all
          --program examples/solutions/build-your-own-object-store/typescript/your_program.sh

      - name: "Starters pass stage 1 (Python, Go, TypeScript — all challenges)"
        run: |
          for ch in build-your-own-temporal build-your-own-wal build-your-own-queue build-your-own-mvcc build-your-own-log build-your-own-lsm build-your-own-workflow-sdk build-your-own-raft build-your-own-scheduler build-your-own-rate-limiter build-your-own-object-store; do
            for lang in python go typescript; do
              ./crafters grade --challenge "$ch" --stage bind \
                --program "challenges/$ch/starters/$lang/your_program.sh"
            done
          done
