name: Release

# Publishes prebuilt grader binaries so users can install without Go:
#   git tag v0.1.0 && git push origin v0.1.0
# install.sh downloads these from the "latest" release.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    name: Build & publish grader binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Cross-compile the crafters binary
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            echo "building crafters_${os}_${arch}"
            GOOS="$os" GOARCH="$arch" go build -trimpath \
              -o "dist/crafters_${os}_${arch}" ./cmd/crafters
          done

      - name: Publish to the GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/crafters_*
          fail_on_unmatched_files: true
          generate_release_notes: true
