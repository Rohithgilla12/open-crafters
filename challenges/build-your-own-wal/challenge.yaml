slug: build-your-own-wal
name: Build your own WAL
short_description: >
  Build the durability primitive under every database: a write-ahead log
  with CRC-framed records, torn-write recovery, corruption detection, and
  snapshot-based compaction — graded byte-for-byte on disk.
difficulty: hard
language_agnostic: true
protocol: PROTOCOL.md
entry_point: your_program.sh --port <port> --data-dir <path>
tester:
  challenge_flag: build-your-own-wal
