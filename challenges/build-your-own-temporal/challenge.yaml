slug: build-your-own-temporal
name: Build your own Temporal
short_description: >
  Build a durable workflow engine from scratch: task queues, event-sourced
  histories, activities with retries, durable timers, signals — and state
  that survives a SIGKILL.
difficulty: hard
language_agnostic: true
protocol: PROTOCOL.md
entry_point: your_program.sh --port <port> --data-dir <path>
tester:
