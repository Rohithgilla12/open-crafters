name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tester:
    name: Build crafters & verify challenges
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Vet, test, and build
        run: |
          go vet ./...
          go test ./...
          go build -o crafters ./cmd/crafters

      - name: "Reference: Build your own Temporal (all 10 stages)"
        run: ./crafters grade --challenge build-your-own-temporal --all
          --program examples/solutions/build-your-own-temporal/python/your_program.sh

      - name: "Reference: Build your own WAL — Python"
        run: ./crafters grade --challenge build-your-own-wal --all
          --program examples/solutions/build-your-own-wal/python/your_program.sh

      - name: "Reference: Build your own WAL — Go"
        run: ./crafters grade --challenge build-your-own-wal --all
          --program examples/solutions/build-your-own-wal/go/your_program.sh

      - name: "Reference: Build your own WAL — TypeScript/Bun"
        run: ./crafters grade --challenge build-your-own-wal --all
          --program examples/solutions/build-your-own-wal/typescript/your_program.sh

      - name: "Reference: Build your own message queue (all 9 stages)"
        run: ./crafters grade --challenge build-your-own-queue --all
          --program examples/solutions/build-your-own-queue/python/your_program.sh

      - name: "Reference: Build your own MVCC (all 9 stages)"
        run: ./crafters grade --challenge build-your-own-mvcc --all
          --program examples/solutions/build-your-own-mvcc/python/your_program.sh

      - name: "Reference: Build your own log (all 9 stages)"
        run: ./crafters grade --challenge build-your-own-log --all
          --program examples/solutions/build-your-own-log/python/your_program.sh

      - name: "Starters pass stage 1 (Python, Go, TypeScript — all challenges)"
        run: |
          for ch in build-your-own-temporal build-your-own-wal build-your-own-queue build-your-own-mvcc build-your-own-log; do
            for lang in python go typescript; do
              ./crafters grade --challenge "$ch" --stage bind \
                --program "challenges/$ch/starters/$lang/your_program.sh"
            done
          done
